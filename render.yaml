services:
  # ── Backend — Django/Daphne ASGI on Render ──────────────────────────────
  - type: web
    name: manmitra-backend
    runtime: python
    region: singapore          # closest to India
    plan: free
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure value
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.9"
      # ── Set these manually in Render dashboard (sensitive) ───────────────
      - key: DATABASE_URL
        sync: false                # set in Render dashboard
      - key: ALLOWED_HOSTS
        sync: false                # e.g. manmitra-backend.onrender.com
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: manmitra-backend
          property: host
      - key: CORS_ALLOWED_ORIGINS
        sync: false                # e.g. https://manmitra.vercel.app
      - key: FRONTEND_URL
        sync: false                # e.g. https://manmitra.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPERUSER_EMAIL
        sync: false
      - key: SUPERUSER_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "ManMitra <noreply@manmitra.ai>"
