version: '3.9'

services:
  # ── Django Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manmitra_backend
    command: >
      sh -c "python backend/manage.py migrate &&
             python backend/create_superuser.py &&
             cd backend && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
      - manmitra_media:/app/backend/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    restart: unless-stopped

  # ── Redis (for Channels) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: manmitra_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: manmitra_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  manmitra_media:
